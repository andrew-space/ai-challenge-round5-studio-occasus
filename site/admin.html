<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Occasus Lab</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="nav">
    <div class="nav__inner">
      <a class="nav__brand" href="index.html"><img src="assets/studio-occasus-logo.png" alt="Studio Occasus" height="36"></a>
      <nav class="nav__links"><a href="index.html" class="nav__link">&larr; Back to Lab</a></nav>
      <button class="btn btn--sm btn--ghost" id="admin-signout">Sign out</button>
    </div>
  </header>

  <main class="admin">
    <!-- Gate -->
    <div class="admin__gate" id="admin-gate">
      <h2>Admin Access Required</h2>
      <p>Sign in with an authorized Google account to manage Occasus Lab.</p>
      <button class="btn-google" id="admin-google-signin">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
    </div>

    <!-- Dashboard -->
    <div class="admin__dashboard hidden" id="admin-dashboard">
      <h2>Dashboard</h2>

      <!-- Stats -->
      <div class="admin__stats">
        <div class="admin__stat-card">
          <span>Total Users</span><strong id="stat-users">-</strong>
        </div>
        <div class="admin__stat-card">
          <span>Pro Users</span><strong id="stat-pro">-</strong>
        </div>
        <div class="admin__stat-card">
          <span>Tool Runs Today</span><strong id="stat-runs">-</strong>
        </div>
        <div class="admin__stat-card">
          <span>Articles Published</span><strong id="stat-articles">-</strong>
        </div>
      </div>

      <!-- Blog Manager -->
      <section class="admin__section">
        <div class="admin__section-head">
          <h3>Blog Articles</h3>
          <button class="btn btn--primary btn--sm" id="btn-new-article">+ New Article</button>
        </div>
        <div id="articles-list" class="admin__list"></div>
      </section>

      <!-- User Manager -->
      <section class="admin__section">
        <h3>Users</h3>
        <div id="users-list" class="admin__list"></div>
      </section>

      <!-- Funnel Analytics -->
      <section class="admin__section">
        <div class="admin__section-head">
          <h3>Funnel Analytics</h3>
          <button class="btn btn--sm btn--ghost" id="btn-refresh-funnel">&#8635; Refresh</button>
        </div>
        <p id="funnel-meta" style="color:var(--muted);font-size:.8rem;margin:.25rem 0 1rem"></p>
        <div id="funnel-chart"><p style="color:var(--muted);font-size:.85rem">Loading…</p></div>
      </section>

      <!-- Article Editor Modal -->
      <div class="admin__editor hidden" id="article-editor">
        <h3 id="editor-title">New Article</h3>
        <form id="article-form" class="form">
          <label for="art-title">Title</label>
          <input id="art-title" name="title" required>
          <label for="art-slug">Slug</label>
          <input id="art-slug" name="slug" required placeholder="e.g. cognitive-load-clarity">
          <label for="art-category">Category</label>
          <input id="art-category" name="category" placeholder="e.g. Neuroscience">
          <label for="art-excerpt">Excerpt</label>
          <textarea id="art-excerpt" name="excerpt" rows="3"></textarea>
          <label for="art-feeds">Feeds tool</label>
          <input id="art-feeds" name="feeds" placeholder="e.g. Clarity Rewriter">
          <label>
            <input type="checkbox" id="art-pro" name="isPro"> Pro-only article
          </label>
          <div class="form__actions">
            <button class="btn btn--primary" type="submit">Save</button>
            <button class="btn btn--ghost" type="button" onclick="document.getElementById('article-editor').classList.add('hidden')">Cancel</button>
          </div>
          <input type="hidden" id="art-id" name="id">
        </form>
      </div>
    </div>
  </main>

  <style>
    .funnel{display:flex;flex-direction:column;gap:.5rem}
    .funnel__row{display:grid;grid-template-columns:12rem 1fr 4.5rem 3rem;align-items:center;gap:.75rem;font-size:.85rem}
    .funnel__label{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .funnel__bar-wrap{background:rgba(var(--accent-rgb,245,158,11),.12);border-radius:3px;height:10px;overflow:hidden}
    .funnel__bar{height:100%;background:var(--accent,#f59e0b);border-radius:3px;transition:width .4s ease}
    .funnel__count{text-align:right;color:var(--text);font-variant-numeric:tabular-nums}
    .funnel__pct{text-align:right;color:var(--muted);font-size:.78rem}
    .funnel__pct--low{color:#e53e3e}
    .funnel__other summary{cursor:pointer;color:var(--muted);font-size:.82rem;padding:.25rem 0}
    .funnel__other-row{display:flex;gap:.5rem;font-size:.82rem;padding:.2rem 0;border-bottom:1px solid rgba(128,128,128,.08)}
    @media(max-width:600px){.funnel__row{grid-template-columns:7rem 1fr 3rem 2.5rem;font-size:.78rem}}
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/firebase-config.js"></script>
  <script src="assets/admin.js"></script>
</body>
</html>
